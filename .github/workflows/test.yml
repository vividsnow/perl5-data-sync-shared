name: Test
on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ['5.40', '5.38', '5.36', '5.34', '5.32', '5.30', '5.28', '5.26', '5.24', '5.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Perl ${{ matrix.perl }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: Install deps
        run: cpanm -n Devel::PPPort

      - name: Build and test
        run: |
          perl Makefile.PL
          make
          make test

  test-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          apk add --no-cache perl perl-dev make gcc musl-dev linux-headers wget
          wget -qO- https://cpanmin.us | perl - App::cpanminus
          cpanm -n Devel::PPPort

      - name: Build and test
        run: |
          perl Makefile.PL
          make
          make test
